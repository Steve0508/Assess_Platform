{% load static %}

<link href="{% static 'css/styles.css' %}" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* HEADER */
header {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 60px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 50px;
}

.logo-text h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0;
}

.logo-text h2 {
    font-size: 12px;
    font-weight: 400;
    color: #777;
    margin: 0;
}

/* NAV */
nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
    margin: 0;
}

nav ul li {
    position: relative;
}

nav ul li a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
    transition: 0.3s;
}

/* HOVER UNDERLINE EFFECT */
nav ul li a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #377dff, #00c6ff);
    transition: 0.3s;
}

nav ul li a:hover::after {
    width: 100%;
}

nav ul li a:hover {
    color: #377dff;
}

/* ACTIVE LINK (optional) */
nav ul li a.active {
    color: #377dff;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    header {
        padding: 15px 20px;
        flex-direction: column;
        gap: 10px;
    }

    nav ul {
        gap: 15px;
    }
}
</style>

<header>
    <div class="logo">
        <img src="{% static 'main/logo.png' %}" alt="EvalZen Logo">
        <div class="logo-text">
            <h1>EvalZen</h1>
            <h2>Assess with Confidence</h2>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="{% url 'index' %}" class="active">Home</a></li>
            <li><a href="{% url 'features' %}">Features</a></li>
            <li><a href="{% url 'admin_login' %}">Admin</a></li>
            <li><a href="{% url 'feedback' %}">Feedback</a></li>
        </ul>
    </nav>
</header>
